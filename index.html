<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0907" id="themeColor">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Routine</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none;background:#0a0907}
#screen{position:fixed;inset:0;overflow:hidden;background:#0a0907}

/* Main view */
#main-view{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);transition:transform 0.28s cubic-bezier(0.32,0.72,0,1),filter 0.28s;will-change:transform}
#main-view.drawer-left{transform:translateX(75px);filter:brightness(0.38);pointer-events:none}
#main-view.drawer-right{transform:translateX(-75px);filter:brightness(0.38);pointer-events:none}

/* Top bar */
.topbar{display:flex;align-items:flex-end;justify-content:space-between;padding-top:calc(env(safe-area-inset-top) + 10px);padding-left:16px;padding-right:16px;padding-bottom:10px;flex-shrink:0;background:var(--bg)}
.topbar-side{display:flex;align-items:center;gap:8px}
.icon-btn{width:32px;height:32px;background:var(--surface);border-radius:50%;border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.icon-btn:active{opacity:0.7}
.icon-btn svg{display:block}
.streak-pill{height:32px;background:var(--surface);border-radius:999px;border:0.5px solid var(--border);display:flex;align-items:center;gap:4px;padding:0 11px 0 9px;flex-shrink:0;cursor:default}
.streak-flame{font-size:14px;line-height:1}
.streak-num{font-size:13px;font-weight:600;color:var(--text1);line-height:1}
.placeholder-btn{width:32px;height:32px;background:var(--surface);border-radius:50%;border:0.5px dashed var(--border);flex-shrink:0;opacity:0.3}

/* Tabs */
.listtabs{display:flex;padding:6px 14px 8px;gap:6px;flex-shrink:0;background:var(--bg)}
.tab{flex:1;padding:7px 4px;text-align:center;font-size:11px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;border-radius:8px;cursor:pointer;border:0.5px solid var(--border);color:var(--text4);transition:all 0.15s}
.tab.active{background:var(--surface);border-color:var(--border);color:var(--accent)}
.tab.available{color:var(--text3)}

/* List pages */
.list-page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:2px 14px 110px;background:var(--bg)}
.list-page.hidden{display:none}

/* Lock banner */
.lock-banner{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:9px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.lock-text{font-size:11px;color:var(--text4)}
.lock-countdown{font-size:12px;color:var(--text3);font-variant-numeric:tabular-nums;font-weight:500}

/* Tasks */
.task{display:flex;align-items:center;gap:10px;padding:14px 12px;background:var(--surface);border-radius:12px;margin-bottom:7px;border:0.5px solid var(--border);cursor:pointer;transition:opacity 0.12s}
.task:active{opacity:0.75}
.task.done{opacity:0.42}
.task.skipped{opacity:0.32}
.task.disabled{cursor:default;opacity:0.26}
.task.disabled:active{opacity:0.26}
.task-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.task.done .task-check{background:var(--accent);border-color:var(--accent)}
.task-label{flex:1;font-size:14px;color:var(--text2);line-height:1.3}
.task.done .task-label{text-decoration:line-through;color:var(--text4)}
.task.skipped .task-label{color:var(--text4)}
.task.disabled .task-label{color:var(--text4)}
.task-skip{font-size:11px;color:#c8980a;padding:5px 10px;border-radius:6px;border:0.5px solid #c8980a;flex-shrink:0;cursor:pointer;-webkit-tap-highlight-color:transparent;font-weight:500;background:rgba(200,152,10,0.1)}
.task-skip.active-skip{color:#F0841A;border-color:#F0841A;background:rgba(240,132,26,0.15)}
.task.disabled .task-skip{pointer-events:none}
.task-del{font-size:12px;color:var(--text4);padding:4px 6px;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent}

/* Add row */
.add-row{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:12px;border:0.5px dashed var(--border);cursor:pointer;margin-top:2px;-webkit-tap-highlight-color:transparent}
.add-row:active{opacity:0.7}
.add-label{font-size:12px;color:var(--text4)}
.plus-c{width:18px;height:18px;border-radius:50%;background:var(--surface);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text4);font-size:15px;line-height:1;flex-shrink:0}

/* Complete button */
.complete-wrap{position:absolute;bottom:0;left:0;right:0;padding:12px 14px calc(env(safe-area-inset-bottom) + 16px);background:linear-gradient(to top,var(--bg) 55%,transparent)}
.complete-btn{width:100%;padding:14px;background:var(--accent);border-radius:14px;text-align:center;font-size:13px;font-weight:600;color:#fff;cursor:pointer;letter-spacing:0.04em;border:none;font-family:system-ui,sans-serif;transition:opacity 0.1s,transform 0.1s}
.complete-btn:active{opacity:0.85;transform:scale(0.98)}
.complete-btn:disabled{background:var(--surface);color:var(--text4);cursor:default;border:0.5px solid var(--border);transform:none;opacity:1}
.complete-btn.done-state{background:var(--surface2);color:var(--text3);cursor:default;border:0.5px solid var(--border);transform:none;opacity:1}

/* Overlay */
#overlay{position:absolute;inset:0;background:rgba(0,0,0,0);z-index:200;pointer-events:none;transition:background 0.28s}
#overlay.open{background:rgba(0,0,0,0.65);pointer-events:all}

/* Drawers */
.drawer{position:absolute;top:0;bottom:0;width:290px;z-index:205;display:flex;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch;transition:transform 0.28s cubic-bezier(0.32,0.72,0,1),box-shadow 0.28s;will-change:transform}
#cal-drawer{left:0;transform:translateX(-100%);border-right:0.5px solid var(--border)}
#cal-drawer.open{transform:translateX(0);box-shadow:20px 0 60px rgba(0,0,0,0.5)}
#settings-drawer{right:0;transform:translateX(100%);border-left:0.5px solid var(--border)}
#settings-drawer.open{transform:translateX(0);box-shadow:-20px 0 60px rgba(0,0,0,0.5)}
.drawer-handle{width:36px;height:4px;border-radius:99px;margin:14px auto 18px;flex-shrink:0;background:var(--border2)}
.d-section{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--text4);padding:12px 18px 4px}
.d-divider{height:0.5px;background:var(--border);margin:10px 18px}
.d-item{padding:12px 18px;font-size:13px;color:var(--text2);cursor:pointer;margin:0 8px 6px;border-radius:10px}
.d-item:active{background:var(--surface2)}
.d-item.danger{color:var(--accent)}
.d-item-outlined{border:0.5px solid var(--border);background:var(--surface2)}

/* Calendar stats */
.cal-stat{padding:8px 18px;display:flex;align-items:center;justify-content:space-between}
.cal-stat-label{font-size:12px;color:var(--text3)}
.cal-stat-value{font-size:14px;font-weight:600;color:var(--text1)}
.stat-box{margin:4px 14px 8px;background:var(--surface2);border:0.5px solid var(--border);border-radius:10px;overflow:hidden}
.stat-box .cal-stat{padding:9px 12px}
.stat-box .cal-stat+.cal-stat{border-top:0.5px solid var(--border)}
.insight-cards{padding:4px 14px 8px;display:flex;flex-direction:column;gap:8px}
.insight-card{background:var(--surface2);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px}
.insight-tag{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px}
.insight-tag.positive{color:var(--accent)}
.insight-tag.negative{color:var(--text4)}
.insight-value{font-size:13px;font-weight:600;color:var(--text1);margin-bottom:1px}
.insight-sub{font-size:11px;color:var(--text4)}
.insight-empty{font-size:12px;color:var(--text4);padding:6px 14px 10px;font-style:italic}
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;padding:6px 18px 12px}
.cal-month-label{font-size:14px;font-weight:500;color:var(--text1)}
.cal-nav-btn{width:28px;height:28px;background:var(--surface2);border-radius:8px;border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:16px;line-height:1}
.cal-nav-btn:active{opacity:0.7}
.cal-grid{padding:0 14px 20px}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.dow{text-align:center;font-size:9px;color:var(--text4);font-weight:500;padding:3px 0;text-transform:uppercase;letter-spacing:0.05em}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;gap:2px}
.cal-day-num{font-size:9px;line-height:1;color:var(--text4)}
.cal-day.past .cal-day-num{color:var(--text3)}
.cal-day.today{background:var(--surface2);border:0.5px solid var(--accent)}
.cal-day.today .cal-day-num{color:var(--accent);font-weight:600}
.cal-day.future .cal-day-num{color:var(--border2)}
.medal{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.medal.gold{background:#c8980a}
.medal.silver{background:#6a6a7a}
.medal.bronze{background:#8a4820}
.redx{width:14px;height:14px;display:flex;align-items:center;justify-content:center}

/* Theme swatches */
.theme-options{display:flex;gap:10px;padding:4px 18px 16px}
.theme-opt{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex:1}
.theme-opt:active{opacity:0.7}
.theme-swatch{width:100%;aspect-ratio:1;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;border:2.5px solid transparent;transition:border-color 0.15s}
.theme-opt.active .theme-swatch{border-color:var(--accent)}
.sw-top{flex:1}.sw-bot{height:30%}
.theme-name{font-size:10px;font-weight:500;color:var(--text3);text-align:center}
.theme-opt.active .theme-name{color:var(--text1)}

/* Bottom sheet */
#sheet-bg{position:absolute;inset:0;z-index:399;display:none;background:rgba(0,0,0,0)}
#bottom-sheet{position:absolute;bottom:0;left:0;right:0;z-index:400;background:var(--surface);border-radius:20px 20px 0 0;border-top:0.5px solid var(--border);padding:0 16px calc(env(safe-area-inset-bottom) + 20px);transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);will-change:transform}
#bottom-sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;border-radius:99px;background:var(--border2);margin:12px auto 16px}
.sheet-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:12px;text-transform:capitalize}
.sheet-input{width:100%;padding:12px 14px;background:var(--surface2);border:0.5px solid var(--border);border-radius:10px;font-size:14px;color:var(--text1);outline:none;font-family:system-ui,sans-serif;margin-bottom:10px}
.sheet-input::placeholder{color:var(--text4)}
.sheet-btn{width:100%;padding:13px;background:var(--accent);border:none;border-radius:12px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;font-family:system-ui,sans-serif}
.sheet-btn:active{opacity:0.85}

/* Task manager modal */
#modal-bg{position:absolute;inset:0;background:rgba(0,0,0,0.7);z-index:350;display:none;align-items:flex-end}
#modal-bg.open{display:flex}
#modal{width:100%;background:var(--surface);border-radius:20px 20px 0 0;border-top:0.5px solid var(--border);max-height:78vh;display:flex;flex-direction:column;padding-bottom:calc(env(safe-area-inset-bottom) + 10px)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 12px;border-bottom:0.5px solid var(--border);flex-shrink:0}
.modal-title{font-size:15px;font-weight:600;color:var(--text1)}
.modal-close-btn{width:28px;height:28px;background:var(--surface2);border-radius:50%;border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--text3)}
.modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-task{display:flex;align-items:center;padding:11px 18px;gap:10px}
.modal-task-label{flex:1;font-size:13px;color:var(--text2)}
.modal-del{width:22px;height:22px;background:var(--surface2);border-radius:50%;border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:var(--text3);flex-shrink:0}
.modal-del:active{opacity:0.7}
.modal-add-row{display:flex;align-items:center;gap:8px;padding:10px 18px;border-top:0.5px solid var(--border);flex-shrink:0}
.modal-input{flex:1;background:var(--surface2);border:0.5px solid var(--border);border-radius:8px;padding:9px 10px;font-size:13px;color:var(--text1);outline:none;font-family:system-ui,sans-serif}
.modal-input::placeholder{color:var(--text4)}
.modal-add-btn{width:32px;height:32px;background:var(--accent);border-radius:8px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:20px;line-height:1;flex-shrink:0}
.modal-add-btn:active{opacity:0.85}

/* Confirm */
#confirm-bg{position:absolute;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:none;align-items:center;justify-content:center;padding:24px}
#confirm-bg.open{display:flex}
.confirm-box{background:var(--surface);border-radius:16px;border:0.5px solid var(--border);padding:22px;width:100%;max-width:300px}
.confirm-title{font-size:15px;font-weight:600;color:var(--text1);margin-bottom:6px}
.confirm-body{font-size:13px;color:var(--text3);margin-bottom:20px;line-height:1.5}
.confirm-btns{display:flex;gap:8px}
.confirm-cancel{flex:1;padding:12px;background:var(--surface2);border:0.5px solid var(--border);border-radius:10px;font-size:13px;color:var(--text2);cursor:pointer;font-family:system-ui,sans-serif}
.confirm-ok{flex:1;padding:12px;background:var(--accent);border:none;border-radius:10px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;font-family:system-ui,sans-serif}
.confirm-cancel:active,.confirm-ok:active{opacity:0.8}
</style>
</head>
<body>
<div id="screen">

  <!-- ── MAIN VIEW ─────────────────────────────────────────────────── -->
  <div id="main-view">

    <div class="topbar">
      <div class="topbar-side">
        <div class="icon-btn" onclick="openDrawer('cal')">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="var(--text3)" stroke-width="1.4" stroke-linecap="round">
            <rect x="1" y="2" width="13" height="12" rx="2"/>
            <path d="M1 6h13M5 1v2M10 1v2"/>
          </svg>
        </div>
        <div class="streak-pill">
          <span class="streak-flame">🔥</span>
          <span class="streak-num" id="streakNum">0</span>
        </div>
      </div>
      <div class="topbar-side">
        <div class="placeholder-btn"></div>
        <div class="icon-btn" onclick="openDrawer('settings')">
          <svg width="22" height="22" viewBox="0 0 20 20" fill="var(--text3)" fill-rule="evenodd">
            <path d="M7.96 4.14L8.82 1.28L11.18 1.28L12.04 4.14L14.05 5.31L16.96 4.62L18.14 6.66L16.09 8.84L16.09 11.16L18.14 13.34L16.96 15.38L14.05 14.69L12.04 15.86L11.18 18.72L8.82 18.72L7.96 15.86L5.95 14.69L3.04 15.38L1.86 13.34L3.91 11.16L3.91 8.84L1.86 6.66L3.04 4.62L5.95 5.31ZM12.80 10 A2.8 2.8 0 1 0 7.20 10 A2.8 2.8 0 1 0 12.80 10Z"/>
          </svg>
        </div>
      </div>
    </div>

    <div class="listtabs">
      <div class="tab" id="tab-morning" onclick="setTab('morning')">Morning</div>
      <div class="tab" id="tab-day"     onclick="setTab('day')">Day</div>
      <div class="tab" id="tab-night"   onclick="setTab('night')">Night</div>
    </div>

    <div class="list-page" id="page-morning"></div>
    <div class="list-page hidden" id="page-day"></div>
    <div class="list-page hidden" id="page-night"></div>

    <div class="complete-wrap">
      <button class="complete-btn" id="completeBtn" onclick="completeList()"></button>
    </div>
  </div>

  <!-- ── OVERLAY ───────────────────────────────────────────────────── -->
  <div id="overlay" onclick="closeAll()"></div>

  <!-- ── CALENDAR DRAWER (left) ────────────────────────────────────── -->
  <div class="drawer" id="cal-drawer">
    <div class="drawer-handle"></div>
    <div class="cal-nav-row">
      <div class="cal-nav-btn" onclick="calNav(-1)">&#8249;</div>
      <span class="cal-month-label" id="calMonthLabel"></span>
      <div class="cal-nav-btn" onclick="calNav(1)">&#8250;</div>
    </div>
    <div class="cal-grid">
      <div class="cal-dow">
        <div class="dow">M</div><div class="dow">T</div><div class="dow">W</div>
        <div class="dow">T</div><div class="dow">F</div><div class="dow">S</div><div class="dow">S</div>
      </div>
      <div class="cal-days" id="calDays"></div>
    </div>
    <div class="d-divider"></div>
    <div class="d-section">Streak</div>
    <div class="stat-box">
      <div class="cal-stat">
        <span class="cal-stat-label">Current streak</span>
        <span class="cal-stat-value" id="calCurrent">0 days</span>
      </div>
      <div class="cal-stat">
        <span class="cal-stat-label">Best streak</span>
        <span class="cal-stat-value" id="calBest">0 days</span>
      </div>
    </div>
    <div class="d-divider"></div>
    <div class="d-section">Time of day</div>
    <div class="stat-box" id="insightTime"></div>
    <div class="d-divider"></div>
    <div class="d-section">Tasks</div>
    <div class="stat-box" id="insightTasks"></div>
  </div>

  <!-- ── SETTINGS DRAWER (right) ───────────────────────────────────── -->
  <div class="drawer" id="settings-drawer">
    <div class="drawer-handle"></div>
    <div class="d-section">Theme</div>
    <div class="theme-options">
      <div class="theme-opt" data-theme="espresso" onclick="applyTheme('espresso')">
        <div class="theme-swatch"><div class="sw-top" style="background:#0a0907"></div><div class="sw-bot" style="background:#F0841A"></div></div>
        <div class="theme-name">Espresso</div>
      </div>
      <div class="theme-opt" data-theme="dark-grey" onclick="applyTheme('dark-grey')">
        <div class="theme-swatch"><div class="sw-top" style="background:#2e2e2e"></div><div class="sw-bot" style="background:#aaa"></div></div>
        <div class="theme-name">Dark</div>
      </div>
      <div class="theme-opt" data-theme="mid-grey" onclick="applyTheme('mid-grey')">
        <div class="theme-swatch"><div class="sw-top" style="background:#c8c4be"></div><div class="sw-bot" style="background:#444"></div></div>
        <div class="theme-name">Mid</div>
      </div>
      <div class="theme-opt" data-theme="light-grey" onclick="applyTheme('light-grey')">
        <div class="theme-swatch"><div class="sw-top" style="background:#e8e8e8"></div><div class="sw-bot" style="background:#111"></div></div>
        <div class="theme-name">Light</div>
      </div>
    </div>
    <div class="d-divider"></div>
    <div class="d-section">Add / Remove Tasks</div>
    <div class="d-item d-item-outlined" onclick="openTaskModal('morning')">Morning list</div>
    <div class="d-item d-item-outlined" onclick="openTaskModal('day')">Day list</div>
    <div class="d-item d-item-outlined" onclick="openTaskModal('night')">Night list</div>
    <div class="d-divider"></div>
    <div class="d-section">Data</div>
    <div class="d-item" onclick="exportData()">Export data</div>
    <div class="d-item" onclick="document.getElementById('importFile').click()">Import data</div>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    <div class="d-divider"></div>
    <div class="d-item danger" onclick="confirmReset()">Reset all data</div>
  </div>

  <!-- ── BOTTOM SHEET (add one-off task) ───────────────────────────── -->
  <div id="sheet-bg" onclick="closeSheet()"></div>
  <div id="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle">Add to morning</div>
    <input class="sheet-input" id="sheetInput" type="text" placeholder="Task name..." maxlength="80"
      onkeydown="if(event.key==='Enter')confirmSheet()">
    <button class="sheet-btn" onclick="confirmSheet()">Add Task</button>
  </div>

  <!-- ── TASK MANAGER MODAL (recurring tasks) ──────────────────────── -->
  <div id="modal-bg" onclick="closeModal()">
    <div id="modal" onclick="event.stopPropagation()">
      <div class="modal-head">
        <span class="modal-title" id="modalTitle"></span>
        <div class="modal-close-btn" onclick="closeModal()">✕</div>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-add-row">
        <input class="modal-input" id="modalInput" type="text" placeholder="Add task..." maxlength="80"
          onkeydown="if(event.key==='Enter')addRecurring()">
        <button class="modal-add-btn" onclick="addRecurring()">+</button>
      </div>
    </div>
  </div>

  <!-- ── CONFIRM DIALOG ────────────────────────────────────────────── -->
  <div id="confirm-bg">
    <div class="confirm-box">
      <div class="confirm-title" id="confirmTitle"></div>
      <div class="confirm-body" id="confirmBody"></div>
      <div class="confirm-btns">
        <button class="confirm-cancel" onclick="closeConfirm()">Cancel</button>
        <button class="confirm-ok" id="confirmOk">Confirm</button>
      </div>
    </div>
  </div>

</div><!-- #screen -->

<script>
// ── THEMES ────────────────────────────────────────────────────────────────────
const THEMES = {
  espresso: {'--bg':'#0a0907','--surface':'#1e1610','--surface2':'#261e14','--border':'#36281a','--border2':'#46382a','--text1':'#fff4e8','--text2':'#ecdcc8','--text3':'#b8a898','--text4':'#6e5e50','--accent':'#F0841A'},
  'dark-grey': {'--bg':'#2e2e2e','--surface':'#383838','--surface2':'#3e3e3e','--border':'#444','--border2':'#555','--text1':'#f0f0f0','--text2':'#e0e0e0','--text3':'#aaa','--text4':'#666','--accent':'#aaa'},
  'mid-grey': {'--bg':'#c8c4be','--surface':'#dedad4','--surface2':'#e8e4de','--border':'#aaa','--border2':'#999','--text1':'#111','--text2':'#222','--text3':'#666','--text4':'#999','--accent':'#444'},
  'light-grey': {'--bg':'#e8e8e8','--surface':'#f0f0f0','--surface2':'#f8f8f8','--border':'#bbb','--border2':'#ccc','--text1':'#111','--text2':'#222','--text3':'#777','--text4':'#aaa','--accent':'#111'}
};

function applyTheme(name) {
  const t = THEMES[name] || THEMES.espresso;
  const root = document.getElementById('screen');
  Object.entries(t).forEach(([k,v]) => root.style.setProperty(k,v));
  document.body.style.background = t['--bg'];
  root.style.background = t['--bg'];
  document.querySelectorAll('.theme-opt').forEach(el => el.classList.toggle('active', el.dataset.theme === name));
  const bg = t['--surface'];
  ['cal-drawer','settings-drawer','modal','bottom-sheet'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.background = bg;
  });
  const cb = document.querySelector('.confirm-box');
  if (cb) cb.style.background = bg;
  document.getElementById('themeColor').setAttribute('content', t['--bg']);
  state.theme = name;
  saveState();
}

// ── DEFAULTS ─────────────────────────────────────────────────────────────────
const DEFAULT_TASKS = {
  morning: ['Make bed','Drink water','Stretch','Breakfast','Multivitamin','Creatine','Metamucil','Brush teeth','Journal','Reading','Set intentions'],
  day:     ['Lunch','Stretch','Walk','Workout','Dinner organised','Talk to family member','Journal','Spend time outside','Midday water','Something creative','Check in with a friend'],
  night:   ['Shower','Skincare','Dinner','Brush teeth','Lay out clothes','Gratitude reflection','Tidy up']
};

const LOCK = { morning: null, day: '11:30', night: '18:00' };
const LISTS = ['morning','day','night'];

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = {
  recurring:    { morning:[...DEFAULT_TASKS.morning], day:[...DEFAULT_TASKS.day], night:[...DEFAULT_TASKS.night] },
  taskStatus:   { morning:{}, day:{}, night:{} },
  oneOff:       { morning:[], day:[], night:[] },
  listDone:     { morning:false, day:false, night:false },
  streak:       0,
  bestStreak:   0,
  history:      {},
  lastDay:      null,
  theme:        'espresso',
  activeTab:    'morning'
};

function loadState() {
  try {
    const s = localStorage.getItem('routine-v1');
    if (s) {
      const p = JSON.parse(s);
      state = Object.assign(state, p);
      LISTS.forEach(l => {
        if (!state.recurring[l])  state.recurring[l]  = [...DEFAULT_TASKS[l]];
        if (!state.taskStatus[l]) state.taskStatus[l] = {};
        if (!state.oneOff[l])     state.oneOff[l]     = [];
      });
    }
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem('routine-v1', JSON.stringify(state)); } catch(e) {}
}

// ── DAY KEY (rolls at 2am, uses local date) ───────────────────────────────────
function getDayKey(d) {
  const now = d || new Date();
  const target = now.getHours() < 2 ? new Date(now.getTime() - 86400000) : now;
  const y = target.getFullYear();
  const m = String(target.getMonth() + 1).padStart(2, '0');
  const day = String(target.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

// ── RESET ─────────────────────────────────────────────────────────────────────
function checkReset() {
  const today = getDayKey();
  if (state.lastDay === today) return;

  if (state.lastDay) {
    const n = LISTS.filter(l => state.listDone[l]).length;
    const medal = n === 3 ? 'gold' : n === 2 ? 'silver' : n === 1 ? 'bronze' : 'x';

    // Snapshot task statuses for recurring tasks only (one-offs excluded)
    const tasks = [];
    LISTS.forEach(list => {
      state.recurring[list].forEach((label, i) => {
        const status = state.taskStatus[list]['r'+i] || 'pending';
        tasks.push({ label, status });
      });
    });

    state.history[state.lastDay] = {
      medal,
      listDone: { ...state.listDone },
      tasks
    };

    if (medal === 'gold') {
      state.streak++;
      if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    } else {
      state.streak = 0;
    }
  }

  state.taskStatus = { morning:{}, day:{}, night:{} };
  state.oneOff     = { morning:[], day:[], night:[] };
  state.listDone   = { morning:false, day:false, night:false };
  state.lastDay    = today;
  state.activeTab  = 'morning';
  saveState();
}

// ── LOCK LOGIC ────────────────────────────────────────────────────────────────
function getUnlockSecs(list) {
  const lock = LOCK[list];
  if (!lock) return 0;
  const now = new Date();
  const [h,m] = lock.split(':').map(Number);
  const t = new Date(now);
  t.setHours(h, m, 0, 0);
  return Math.max(0, Math.floor((t - now) / 1000));
}

function isTimeLocked(list) { return getUnlockSecs(list) > 0; }
function isPrevDone(list)   { return list === 'morning' || (list === 'day' ? state.listDone.morning : state.listDone.day); }
function canInteract(list)  { return !isTimeLocked(list) && isPrevDone(list); }

function fmtCD(s) {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sc = s%60;
  return h > 0 ? h+'h '+String(m).padStart(2,'0')+'m' : String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0');
}

// ── TABS ──────────────────────────────────────────────────────────────────────
let currentTab = 'morning';

function setTab(list) {
  currentTab = list;
  state.activeTab = list;
  LISTS.forEach(l => {
    const tab = document.getElementById('tab-'+l);
    const pg  = document.getElementById('page-'+l);
    tab.className = 'tab' + (l === list ? ' active' : canInteract(l) ? ' available' : '');
    pg.classList.toggle('hidden', l !== list);
  });
  buildPage(list);
  updateBtn();
}

// ── BUILD PAGE ────────────────────────────────────────────────────────────────
function buildPage(list) {
  const pg = document.getElementById('page-'+list);
  const active = canInteract(list);
  let html = '';

  if (!active) {
    const tl = isTimeLocked(list), pd = isPrevDone(list);
    const prev = list === 'day' ? 'Morning' : 'Day';
    let msg, showCD = false;
    if (tl && pd)  { msg = 'Unlocks at '+(list==='day'?'11:30 am':'6:00 pm'); showCD=true; }
    else if (tl)   { msg = 'Complete '+prev+' list first'; }
    else           { msg = 'Complete '+prev+' list first'; }
    html += `<div class="lock-banner"><span class="lock-text">${msg}</span><span class="lock-countdown" id="cd-${list}">${showCD?fmtCD(getUnlockSecs(list)):''}</span></div>`;
  }

  state.recurring[list].forEach((label,i) => {
    const id = 'r'+i;
    html += taskRow(list, id, label, state.taskStatus[list][id]||'pending', !active, false);
  });

  state.oneOff[list].forEach(t => {
    html += taskRow(list, t.id, t.label, state.taskStatus[list][t.id]||'pending', !active, true);
  });

  html += `<div class="add-row" onclick="openSheet('${list}')"><div class="plus-c">+</div><span class="add-label">Add to today's ${list}...</span></div>`;
  pg.innerHTML = html;
}

function taskRow(list, id, label, status, disabled, oneOff) {
  const cls = disabled ? 'disabled' : status === 'done' ? 'done' : status === 'skip' ? 'skipped' : '';
  const chk = status === 'done' ? '<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' : '';
  const skipCls = status === 'skip' ? ' active-skip' : '';
  const tapTask = disabled ? '' : `onclick="toggleTask('${list}','${id}')"`;
  const tapSkip = disabled ? '' : `onclick="skipTask(event,'${list}','${id}')"`;
  const del = oneOff ? `<span class="task-del" onclick="delOneOff(event,'${list}','${id}')">✕</span>` : '';
  return `<div class="task ${cls}" ${tapTask}><div class="task-check">${chk}</div><span class="task-label">${label}</span><span class="task-skip${skipCls}" ${tapSkip}>skip</span>${del}</div>`;
}

// ── TASK ACTIONS ──────────────────────────────────────────────────────────────
function toggleTask(list, id) {
  if (!canInteract(list)) return;
  const cur = state.taskStatus[list][id] || 'pending';
  state.taskStatus[list][id] = cur === 'done' ? 'pending' : 'done';
  saveState(); buildPage(list); updateBtn();
}

function skipTask(e, list, id) {
  e.stopPropagation();
  if (!canInteract(list)) return;
  const cur = state.taskStatus[list][id] || 'pending';
  state.taskStatus[list][id] = cur === 'skip' ? 'pending' : 'skip';
  saveState(); buildPage(list); updateBtn();
}

function delOneOff(e, list, id) {
  e.stopPropagation();
  state.oneOff[list] = state.oneOff[list].filter(t => t.id !== id);
  delete state.taskStatus[list][id];
  saveState(); buildPage(list); updateBtn();
}

function allTasksDone(list) {
  const ids = [
    ...state.recurring[list].map((_,i) => 'r'+i),
    ...state.oneOff[list].map(t => t.id)
  ];
  return ids.length > 0 && ids.every(id => { const s = state.taskStatus[list][id]||'pending'; return s==='done'||s==='skip'; });
}

function completeList() {
  if (!canInteract(currentTab) || !allTasksDone(currentTab)) return;
  state.listDone[currentTab] = true;
  saveState(); updateBtn();
  const idx = LISTS.indexOf(currentTab);
  if (idx < 2) setTimeout(() => setTab(LISTS[idx+1]), 300);
  else buildPage(currentTab);
}

function updateBtn() {
  const btn = document.getElementById('completeBtn');
  const cap = currentTab.charAt(0).toUpperCase() + currentTab.slice(1);
  if (state.listDone[currentTab]) {
    btn.textContent = '✓ '+cap+' Complete';
    btn.className = 'complete-btn done-state';
    btn.disabled = true; return;
  }
  btn.className = 'complete-btn';
  btn.textContent = 'Complete '+cap+' List';
  btn.disabled = !canInteract(currentTab) || !allTasksDone(currentTab);
}

// ── DRAWERS ───────────────────────────────────────────────────────────────────
function openDrawer(which) {
  document.getElementById('overlay').classList.add('open');
  if (which === 'cal') {
    document.getElementById('cal-drawer').classList.add('open');
    document.getElementById('main-view').classList.add('drawer-left');
    renderCal();
  } else {
    document.getElementById('settings-drawer').classList.add('open');
    document.getElementById('main-view').classList.add('drawer-right');
  }
}

function closeAll() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('cal-drawer').classList.remove('open');
  document.getElementById('settings-drawer').classList.remove('open');
  document.getElementById('main-view').classList.remove('drawer-left','drawer-right');
}

// Swipe gestures
let sx=0, sy=0, tracking=false;
document.getElementById('main-view').addEventListener('touchstart', e => {
  sx = e.touches[0].clientX; sy = e.touches[0].clientY; tracking = true;
},{passive:true});
document.getElementById('main-view').addEventListener('touchmove', e => {
  if (!tracking) return;
  if (Math.abs(e.touches[0].clientY-sy) > Math.abs(e.touches[0].clientX-sx)*1.5) tracking=false;
},{passive:true});
document.getElementById('main-view').addEventListener('touchend', e => {
  if (!tracking) return; tracking=false;
  const dx = e.changedTouches[0].clientX - sx;
  if (dx < -60) openDrawer('settings');
  if (dx > 60)  openDrawer('cal');
});

// ── STATS CALCULATIONS ────────────────────────────────────────────────────────
const MIN_DAYS = 7;
const cap = s => s.charAt(0).toUpperCase() + s.slice(1);

function calcListStats() {
  const counts = { morning:{done:0,total:0}, day:{done:0,total:0}, night:{done:0,total:0} };
  Object.values(state.history).forEach(entry => {
    if (typeof entry !== 'object' || !entry.listDone) return;
    LISTS.forEach(l => {
      counts[l].total++;
      if (entry.listDone[l]) counts[l].done++;
    });
  });
  const eligible = LISTS.filter(l => counts[l].total >= MIN_DAYS);
  if (eligible.length < 2) return null;
  const rated = eligible.map(l => ({ list: l, rate: counts[l].done / counts[l].total, total: counts[l].total }));
  rated.sort((a,b) => b.rate - a.rate);
  return { strongest: rated[0], weakest: rated[rated.length-1] };
}

function calcTaskStats() {
  const map = {};
  Object.values(state.history).forEach(entry => {
    if (typeof entry !== 'object' || !entry.tasks) return;
    entry.tasks.forEach(({ label, status }) => {
      if (!map[label]) map[label] = { done:0, missed:0 };
      if (status === 'done')    map[label].done++;
      else if (status === 'pending') map[label].missed++; // pending at reset = missed
      // skip = excluded from both sides
    });
  });
  const eligible = Object.entries(map)
    .filter(([,v]) => (v.done + v.missed) >= MIN_DAYS)
    .map(([label, v]) => ({ label, rate: v.done / (v.done + v.missed), total: v.done + v.missed }));
  if (eligible.length < 2) return null;
  eligible.sort((a,b) => b.rate - a.rate);
  return { best: eligible[0], worst: eligible[eligible.length-1] };
}

function pct(rate) { return Math.round(rate * 100) + '%'; }

function renderInsightTime(stats) {
  const el = document.getElementById('insightTime');
  if (!stats) { el.innerHTML = '<div class="cal-stat"><span class="cal-stat-label">Check back after 7 days of data</span></div>'; return; }
  el.innerHTML = `
    <div class="cal-stat">
      <span class="cal-stat-label">Strongest</span>
      <span class="cal-stat-value">${cap(stats.strongest.list)} · ${pct(stats.strongest.rate)}</span>
    </div>
    <div class="cal-stat" style="border-top:0.5px solid var(--border)">
      <span class="cal-stat-label">Needs work</span>
      <span class="cal-stat-value">${cap(stats.weakest.list)} · ${pct(stats.weakest.rate)}</span>
    </div>`;
}

function renderInsightTasks(stats) {
  const el = document.getElementById('insightTasks');
  if (!stats) { el.innerHTML = '<div class="cal-stat"><span class="cal-stat-label">Check back after 7 days of data</span></div>'; return; }
  el.innerHTML = `
    <div class="cal-stat">
      <span class="cal-stat-label">Best task</span>
      <span class="cal-stat-value">${stats.best.label} · ${pct(stats.best.rate)}</span>
    </div>
    <div class="cal-stat" style="border-top:0.5px solid var(--border)">
      <span class="cal-stat-label">Needs improvement</span>
      <span class="cal-stat-value">${stats.worst.label} · ${pct(stats.worst.rate)}</span>
    </div>`;
}

// ── CALENDAR ──────────────────────────────────────────────────────────────────
let calY, calM;

function renderCal() {
  const now = new Date();
  if (calY === undefined) { calY = now.getFullYear(); calM = now.getMonth(); }

  const s = state.streak, b = state.bestStreak;
  document.getElementById('calCurrent').textContent = s + ' day' + (s!==1?'s':'');
  document.getElementById('calBest').textContent    = b + ' day' + (b!==1?'s':'');

  renderInsightTime(calcListStats());
  renderInsightTasks(calcTaskStats());

  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calMonthLabel').textContent = MONTHS[calM] + ' ' + calY;

  const container = document.getElementById('calDays');
  container.innerHTML = '';
  const todayKey = getDayKey();
  const firstDow = new Date(calY, calM, 1).getDay();
  const offset = firstDow === 0 ? 6 : firstDow - 1;
  const days = new Date(calY, calM+1, 0).getDate();

  for (let i=0; i<offset; i++) {
    const el = document.createElement('div');
    el.className='cal-day'; container.appendChild(el);
  }

  for (let d=1; d<=days; d++) {
    const key = calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const el = document.createElement('div');
    const isToday = key === todayKey;
    const isFuture = key > todayKey;
    el.className = 'cal-day'+(isToday?' today':isFuture?' future':' past');
    let inner = '';
    if (!isFuture && !isToday) {
      const entry = state.history[key];
      const m = typeof entry === 'string' ? entry : (entry && entry.medal);
      if (m==='gold')        inner = '<div class="medal gold"></div>';
      else if (m==='silver') inner = '<div class="medal silver"></div>';
      else if (m==='bronze') inner = '<div class="medal bronze"></div>';
      else if (m==='x')      inner = '<div class="redx"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><line x1="2" y1="2" x2="10" y2="10" stroke="#8a3820" stroke-width="1.5" stroke-linecap="round"/><line x1="10" y1="2" x2="2" y2="10" stroke="#8a3820" stroke-width="1.5" stroke-linecap="round"/></svg></div>';
    }
    el.innerHTML = inner + '<span class="cal-day-num">'+d+'</span>';
    container.appendChild(el);
  }
}

function calNav(dir) {
  calM += dir;
  if (calM > 11) { calM=0; calY++; }
  if (calM < 0)  { calM=11; calY--; }
  renderCal();
}

// ── BOTTOM SHEET ──────────────────────────────────────────────────────────────
let sheetList = 'morning';

function openSheet(list) {
  sheetList = list;
  document.getElementById('sheetTitle').textContent = 'Add to '+list;
  document.getElementById('sheetInput').value = '';
  document.getElementById('bottom-sheet').classList.add('open');
  document.getElementById('sheet-bg').style.display = 'block';
  setTimeout(() => document.getElementById('sheetInput').focus(), 320);
}

function closeSheet() {
  document.getElementById('bottom-sheet').classList.remove('open');
  document.getElementById('sheet-bg').style.display = 'none';
  document.getElementById('sheetInput').blur();
}

function confirmSheet() {
  const val = document.getElementById('sheetInput').value.trim();
  if (!val) return;
  const id = 'oo'+Date.now();
  state.oneOff[sheetList].push({id, label:val});
  saveState(); closeSheet(); buildPage(sheetList); updateBtn();
}

// ── TASK MANAGER MODAL ────────────────────────────────────────────────────────
let modalList = 'morning';

function openTaskModal(list) {
  modalList = list;
  document.getElementById('modalTitle').textContent = list.charAt(0).toUpperCase()+list.slice(1)+' list';
  document.getElementById('modalInput').value = '';
  renderModalBody();
  document.getElementById('modal-bg').classList.add('open');
  closeAll();
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  buildPage(currentTab); updateBtn();
}

function renderModalBody() {
  const body = document.getElementById('modalBody');
  body.innerHTML = state.recurring[modalList].map((label,i) =>
    `<div class="modal-task"><span class="modal-task-label">${label}</span><div class="modal-del" onclick="delRecurring(${i})">✕</div></div>`
  ).join('');
}

function delRecurring(i) {
  state.recurring[modalList].splice(i,1);
  // Rebuild recurring status keys, shifting indexes
  const newStatus = {};
  Object.keys(state.taskStatus[modalList]).forEach(key => {
    if (!key.startsWith('r')) { newStatus[key] = state.taskStatus[modalList][key]; return; }
    const idx = parseInt(key.slice(1));
    if (idx < i) newStatus[key] = state.taskStatus[modalList][key];
    else if (idx > i) newStatus['r'+(idx-1)] = state.taskStatus[modalList][key];
  });
  state.taskStatus[modalList] = newStatus;
  saveState(); renderModalBody();
}

function addRecurring() {
  const val = document.getElementById('modalInput').value.trim();
  if (!val) return;
  state.recurring[modalList].push(val);
  document.getElementById('modalInput').value = '';
  saveState(); renderModalBody();
}

// ── EXPORT / IMPORT ───────────────────────────────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'routine-'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); closeAll();
}

function importData(e) {
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const d = JSON.parse(evt.target.result);
      state = Object.assign(state, d);
      saveState(); closeAll();
      applyTheme(state.theme||'espresso');
      checkReset();
      currentTab = state.activeTab||'morning';
      setTab(currentTab);
    } catch(err) { alert('Import failed — invalid file.'); }
    e.target.value='';
  };
  reader.readAsText(e.target.files[0]);
}

// ── CONFIRM / RESET ───────────────────────────────────────────────────────────
function confirmReset() {
  document.getElementById('confirmTitle').textContent = 'Reset all data?';
  document.getElementById('confirmBody').textContent = 'This will erase all history, streaks, and tasks. It cannot be undone.';
  document.getElementById('confirmOk').textContent = 'Reset';
  document.getElementById('confirmOk').onclick = doReset;
  document.getElementById('confirm-bg').classList.add('open');
  closeAll();
}

function doReset() {
  state = {
    recurring:  { morning:[...DEFAULT_TASKS.morning], day:[...DEFAULT_TASKS.day], night:[...DEFAULT_TASKS.night] },
    taskStatus: { morning:{}, day:{}, night:{} },
    oneOff:     { morning:[], day:[], night:[] },
    listDone:   { morning:false, day:false, night:false },
    streak:0, bestStreak:0, history:{},
    lastDay: getDayKey(), theme:state.theme, activeTab:'morning'
  };
  saveState(); closeConfirm();
  currentTab='morning'; setTab('morning');
  document.getElementById('streakNum').textContent='0';
}

function closeConfirm() { document.getElementById('confirm-bg').classList.remove('open'); }

// ── TICKER ────────────────────────────────────────────────────────────────────
const TIMED_LISTS = LISTS.filter(l => LOCK[l]); // only day and night
setInterval(() => {
  // Rollover check
  if (state.lastDay && state.lastDay !== getDayKey()) {
    checkReset(); currentTab = 'morning'; setTab('morning');
  }
  // Update countdowns for time-locked lists only
  TIMED_LISTS.forEach(list => {
    const el = document.getElementById('cd-' + list);
    const s = getUnlockSecs(list);
    if (s > 0) {
      if (el) el.textContent = fmtCD(s);
    } else {
      // Lock just lifted — rebuild once by checking if banner still shows
      if (el) { buildPage(list); if (list === currentTab) updateBtn(); }
    }
  });
  // Streak display
  document.getElementById('streakNum').textContent = state.streak;
}, 1000);

// ── INIT ──────────────────────────────────────────────────────────────────────
loadState();
checkReset();
applyTheme(state.theme||'espresso');
currentTab = state.activeTab||'morning';
setTab(currentTab);
document.getElementById('streakNum').textContent = state.streak;

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
</body>
